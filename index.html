<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리별 링크 메모장</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 폰트어썸 (아이콘용) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon-96x96.png" type="img/favicon-96x96.png">
    <style>
        /* 드래그 중 자식 요소 이벤트 방지(깜빡임 해결) */
        body.is-dragging .link-card * {
            pointer-events: none;
        }

        /* 소카테고리 헤더 화살표 회전 애니메이션 */
        .subcat-header i.fa-chevron-down {
            transition: transform 0.3s ease;
        }

        .subcat-header.is-closed i.fa-chevron-down {
            transform: rotate(-90deg);
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <!-- 로그인 화면 -->
    <div id="loginScreen" class="hidden fixed inset-0 bg-gray-100 z-40 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl p-8 w-full max-w-md border border-gray-200">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-800"><i
                        class="fa-solid fa-bookmark text-blue-500 mr-2"></i>링크 메모장</h2>
                <p class="text-gray-500 mt-2">나만의 카테고리별 링크를 저장하세요</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                    <input type="email" id="loginEmail"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="example@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="loginPassword"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="••••••••" onkeypress="if(event.key==='Enter') window.handleEmailLogin()">
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="window.handleEmailLogin()"
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">로그인</button>
                    <button onclick="window.handleEmailRegister()"
                        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg transition-colors border border-gray-300">회원가입</button>
                </div>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm"><span
                            class="px-2 bg-white text-gray-500">또는</span></div>
                </div>

                <button onclick="window.handleGoogleLogin()"
                    class="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-2 px-4 rounded-lg border border-gray-300 shadow-sm flex items-center justify-center gap-2 transition-colors mb-2">
                    <i class="fa-brands fa-google text-red-500"></i> Google로 로그인
                </button>

                <button onclick="window.handleGuestLogin()"
                    class="w-full text-center text-sm text-gray-500 hover:text-gray-800 underline transition-colors pt-2">
                    게스트로 시작하기
                </button>
            </div>
        </div>
    </div>

    <!-- 메인 앱 (로그인 후 표시됨) -->
    <div id="mainApp"
        class="hidden max-w-5xl mx-auto mt-10 bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
        <!-- 타이틀 -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-extrabold text-center text-gray-800 tracking-tight">
                <i class="fa-solid fa-bookmark text-blue-500 mr-2"></i>카테고리별 링크 메모장
            </h1>
            <div id="userInfoDisplay"
                class="text-sm font-medium flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-200 shadow-sm">
                <!-- 로그인 정보 및 계정 연동 버튼 표시 영역 -->
            </div>
        </div>

        <!-- 메인 탭 영역 -->
        <div id="tabsContainer"
            class="flex border-b border-gray-300 mb-6 overflow-x-auto whitespace-nowrap scrollbar-hide">
            <!-- 자바스크립트로 탭 버튼들이 생성됩니다 -->
        </div>

        <!-- 링크 입력 폼 영역 -->
        <div class="bg-blue-50 p-5 rounded-lg mb-4 border border-blue-100 shadow-sm flex flex-col gap-3">
            <div class="flex flex-col md:flex-row gap-3">
                <div
                    class="flex-[0.8] flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-solid fa-folder-tree text-gray-400 mr-2"></i>
                    <select id="subCategorySelect"
                        class="w-full py-2 outline-none bg-transparent cursor-pointer text-gray-700">
                    </select>
                </div>

                <div
                    class="flex-1 flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-solid fa-font text-gray-400 mr-2"></i>
                    <input type="text" id="linkText" placeholder="버튼 텍스트 (예: 네이버)"
                        class="w-full py-2 outline-none bg-transparent" autocomplete="off">
                </div>

                <div
                    class="flex-[2] flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-solid fa-link text-gray-400 mr-2"></i>
                    <input type="text" id="linkUrl" placeholder="링크 (예: https://naver.com)"
                        class="w-full py-2 outline-none bg-transparent" autocomplete="off">
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <div
                    class="flex-1 flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-regular fa-comment text-gray-400 mr-2"></i>
                    <input type="text" id="linkComment" placeholder="코멘트 (선택사항, 예: 디자인 레퍼런스용)"
                        class="w-full py-2 outline-none bg-transparent" autocomplete="off"
                        onkeypress="window.handleKeyPress(event)">
                </div>

                <button onclick="window.saveLink()"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-2 rounded shadow transition-colors duration-200 flex items-center justify-center whitespace-nowrap">
                    <i class="fa-solid fa-plus mr-2"></i>저장
                </button>
            </div>
        </div>

        <!-- 소분류 추가 관리 영역 -->
        <div class="flex justify-between items-center mb-2 px-2">
            <span class="text-sm font-medium text-gray-500" id="currentTabLabel">현재 카테고리 내역</span>
            <button onclick="window.addSubcategory()"
                class="text-sm bg-white border border-gray-300 hover:border-blue-500 hover:text-blue-600 text-gray-600 px-3 py-1.5 rounded transition-colors shadow-sm flex items-center">
                <i class="fa-solid fa-folder-plus mr-1.5"></i>소분류 추가
            </button>
        </div>

        <div id="linksContainer" class="space-y-4">
            <!-- 자바스크립트로 소분류 컨테이너 및 링크들이 생성됩니다 -->
        </div>

        <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-gray-400">
            <i class="fa-regular fa-folder-open text-4xl mb-3"></i>
            <p>이 카테고리에 생성된 소분류 및 링크가 없습니다.</p>
        </div>
    </div>

    <!-- 커스텀 모달 UI -->
    <div id="customModal"
        class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-xl p-6 w-[90%] max-w-sm">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-2">알림</h3>
            <p id="modalMessage" class="text-gray-600 text-sm mb-4 break-keep">메시지 내용</p>
            <textarea id="modalInput" rows="1"
                class="hidden w-full border border-gray-300 rounded p-2 mb-4 focus:ring-2 focus:ring-blue-400 outline-none resize-none overflow-hidden leading-snug"
                autocomplete="off" style="min-height: 42px; max-height: 200px; overflow-y: auto;"></textarea>
            <div class="flex justify-end gap-2 mt-2">
                <button id="modalCancelBtn"
                    class="hidden px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded transition-colors">취소</button>
                <button id="modalConfirmBtn"
                    class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded transition-colors">확인</button>
            </div>
        </div>
    </div>

    <!-- 계정 연동(데이터 보존) 모달 UI -->
    <div id="linkAccountModal"
        class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-xl p-6 w-[90%] max-w-md">
            <h3 class="text-lg font-bold text-gray-800 mb-2"><i class="fa-solid fa-link text-blue-500 mr-2"></i>계정 연동
            </h3>
            <p class="text-gray-600 text-sm mb-5 break-keep">게스트로 작성하신 데이터가 사라지지 않도록 계정을 연동해 안전하게 영구 보관하세요.</p>

            <div class="space-y-3 mb-4">
                <input type="email" id="linkEmailInput"
                    class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none"
                    placeholder="연동할 이메일 주소" autocomplete="off">
                <input type="password" id="linkPasswordInput"
                    class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none"
                    placeholder="비밀번호 (6자리 이상)" autocomplete="off">
                <button onclick="window.handleEmailLink()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">이메일
                    계정으로 연동</button>
            </div>

            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">또는</span>
                </div>
            </div>

            <button onclick="window.handleGoogleLink()"
                class="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-2 rounded-lg border border-gray-300 shadow-sm flex items-center justify-center gap-2 transition-colors mb-5">
                <i class="fa-brands fa-google text-red-500"></i> Google 계정으로 연동
            </button>

            <div class="flex justify-end border-t border-gray-200 pt-3">
                <button onclick="window.closeLinkAccountModal()"
                    class="px-5 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded transition-colors">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 모달 제어 로직 ---
        const modal = document.getElementById('customModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalInput = document.getElementById('modalInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');
        let currentModalCallback = null;

        function openModal({ type, title, message, defaultValue = '', onConfirm = null }) {
            modalTitle.textContent = title;
            modalMessage.innerHTML = message;
            currentModalCallback = onConfirm;

            modalInput.value = defaultValue;
            modalInput.classList.add('hidden');
            modalCancelBtn.classList.add('hidden');

            if (type === 'prompt') {
                modalInput.classList.remove('hidden');
                modalCancelBtn.classList.remove('hidden');

                modalInput.style.height = 'auto';
                setTimeout(() => {
                    modalInput.style.height = modalInput.scrollHeight + 'px';
                    modalInput.focus();
                }, 50);

                modalInput.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        confirmModal();
                    }
                };
            } else if (type === 'confirm') {
                modalCancelBtn.classList.remove('hidden');
            }

            modal.classList.remove('hidden');
        }

        modalInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        function closeModal() {
            modal.classList.add('hidden');
            currentModalCallback = null;
        }

        function confirmModal() {
            const val = modalInput.value;
            const cb = currentModalCallback;
            closeModal();
            if (cb) cb(val);
        }

        modalConfirmBtn.onclick = confirmModal;
        modalCancelBtn.onclick = closeModal;

        function customAlert(msg) { openModal({ type: 'alert', title: '알림', message: msg }); }
        function customConfirm(msg, onConfirm) { openModal({ type: 'confirm', title: '확인', message: msg, onConfirm: () => onConfirm() }); }
        function customPrompt(msg, defaultValue, onConfirm) { openModal({ type: 'prompt', title: '입력', message: msg, defaultValue: defaultValue, onConfirm: onConfirm }); }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, EmailAuthProvider, linkWithCredential, linkWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // [구조 수정] 에러 위험이 있던 런타임 검증을 제거하고, Vite의 빌드 타임 치환기능을 100% 온전하게 흡수할 수 있는 대입 블록 구조로 변경했습니다.
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // Vite 빌드 시 "import.meta.env.VITE_..." 구문 전체가 실제 시크릿 값으로 자동 치환됩니다.
        // 일반 브라우저나 로컬 미리보기 환경 등 빌드 프로세스가 없을 때는 try-catch에 의해 안전하게 에러가 가로채져 작동이 멈추지 않습니다.
        try {
            firebaseConfig.apiKey = import.meta.env.VITE_FIREBASE_API_KEY;
            firebaseConfig.authDomain = import.meta.env.VITE_FIREBASE_AUTH_DOMAIN;
            firebaseConfig.projectId = import.meta.env.VITE_FIREBASE_PROJECT_ID;
            firebaseConfig.storageBucket = import.meta.env.VITE_FIREBASE_STORAGE_BUCKET;
            firebaseConfig.messagingSenderId = import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID;
            firebaseConfig.appId = import.meta.env.VITE_FIREBASE_APP_ID;
        } catch (e) {
            console.warn("Vite environment object is unavailable. Fallback variables will be used.");
        }

        // 정의된 firebaseConfig를 할당하되, Canvas Workspace 상의 데이터 연동 변수가 존재하면 오버라이드합니다.
        let configToUse = firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            const parsedConfig = JSON.parse(__firebase_config);
            if (Object.keys(parsedConfig).length > 0) configToUse = parsedConfig;
        }

        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const userInfoDisplay = document.getElementById('userInfoDisplay');

        // [안전 가드] Firebase API Key 값이 비어 있을 경우 화면 잠금을 풀고 경고 안내 팝업을 표시합니다.
        if (!configToUse || !configToUse.apiKey) {
            console.error("Firebase Configuration is missing or empty.");
            loginScreen.classList.remove('hidden');
            loginScreen.classList.add('flex');
            
            setTimeout(() => {
                customAlert(`
                    <div class="text-center">
                        <i class="fa-solid fa-triangle-exclamation text-yellow-500 text-3xl mb-2"></i><br>
                        <b class="text-lg">Firebase 설정 누락 안내</b><br>
                        <span class="text-sm text-red-500 font-semibold">API Key 값이 감지되지 않았습니다.</span>
                    </div>
                    <div class="mt-4 text-xs text-gray-600 bg-gray-50 p-3 rounded text-left leading-relaxed">
                        <b>해결 방법:</b><br>
                        1. 깃허브 Repository의 <b>Settings > Secrets and variables > Actions</b>에 시크릿 변수(API Key 등)가 제대로 등록되어 있는지 체크해 주세요.<br><br>
                        2. 깃허브 Pages 배포 소스가 <b>GitHub Actions</b> 방식으로 빌드 및 발행되는지 저장소 Pages 설정 탭을 점검해 보세요.
                    </div>
                `);
            }, 600);
        }

        // Firebase 설정이 있을 때만 정상 초기화 진행
        const app = (configToUse && configToUse.apiKey) ? initializeApp(configToUse) : null;
        const auth = app ? getAuth(app) : null;
        const db = app ? getFirestore(app) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-github-memo-app';

        let currentUser = null;
        let unsubscribeSnapshot = null;

        let categories = ['업무', '학습', '개인', '도구', '기타'];
        let activeTab = categories[0];
        let linkData = {};
        let draggedItem = null;
        let isFirstLoad = true;

        // ------------------ 사용자 상태 & UI 갱신 ------------------
        function updateHeaderUI(user) {
            const isGuest = user.isAnonymous || !user.email;
            const userIdentifier = isGuest ? '게스트 사용자' : user.email;

            const linkBtnHtml = isGuest ?
                `<button onclick="window.openLinkAccountModal()" class="text-xs bg-green-100 text-green-700 hover:bg-green-600 hover:text-white px-3 py-1.5 rounded transition-colors font-semibold shadow-sm mr-2 border border-green-200">
                    <i class="fa-solid fa-link mr-1"></i>계정 연동
                 </button>` : '';

            userInfoDisplay.innerHTML = `
                <i class="fa-solid fa-user-circle text-blue-500 mr-2 text-lg"></i>
                <span class="mr-3 text-gray-700 font-bold">${userIdentifier}</span>
                ${linkBtnHtml}
                <button onclick="window.handleLogout()" class="text-xs bg-red-100 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded transition-colors font-semibold shadow-sm border border-red-200">로그아웃</button>
            `;
        }

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    loginScreen.classList.add('hidden');
                    loginScreen.classList.remove('flex');
                    mainApp.classList.remove('hidden');

                    updateHeaderUI(user);
                    loadDataFromFirestore();
                } else {
                    currentUser = null;
                    loginScreen.classList.remove('hidden');
                    loginScreen.classList.add('flex');
                    mainApp.classList.add('hidden');
                    if (unsubscribeSnapshot) {
                        unsubscribeSnapshot();
                        unsubscribeSnapshot = null;
                    }
                    categories = ['업무', '학습', '개인', '도구', '기타'];
                    activeTab = categories[0];
                    linkData = {};
                    isFirstLoad = true;
                }
            });
        }

        // ------------------ 인증 및 계정 연동 관련 ------------------
        window.handleEmailLogin = async () => {
            if (!auth) return;
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return customAlert("이메일과 비밀번호를 모두 입력해주세요.");
            try { await signInWithEmailAndPassword(auth, email, password); }
            catch (error) { customAlert("로그인 실패: 이메일 또는 비밀번호를 확인해주세요."); }
        };

        window.handleEmailRegister = async () => {
            if (!auth) return;
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return customAlert("이메일과 비밀번호를 모두 입력해주세요.");
            try { await createUserWithEmailAndPassword(auth, email, password); customAlert("회원가입이 완료되었습니다!"); }
            catch (error) { customAlert("회원가입 실패: " + error.message); }
        };

        window.handleGoogleLogin = async () => {
            if (!auth) return;
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); }
            catch (error) {
                let errorMsg = "로그인 처리에 실패했습니다. (" + error.code + ")";
                let solution = "Firebase 콘솔의 <b>Authentication > Settings > 승인된 도메인</b>에 현재 사이트 주소(예: github.io)를 추가해주세요.";
                if (error.code === 'auth/unauthorized-domain') {
                    errorMsg = "현재 실행 중인 도메인이 인증에 허용되지 않았습니다.";
                } else if (error.code === 'auth/popup-closed-by-user') {
                    errorMsg = "로그인 팝업이 닫혔습니다.";
                    solution = "브라우저의 팝업 차단을 해제하시거나 다시 시도해주세요.";
                } else if (error.code === 'auth/operation-not-allowed') {
                    errorMsg = "Firebase에서 'Google 로그인'이 비활성화되어 있습니다.";
                    solution = "Firebase 콘솔의 <b>Authentication > Sign-in method</b> 탭에서 <b>Google</b> 제공업체를 추가하고 '사용 설정'해주세요.";
                }
                customAlert(`<div class="text-center"><i class="fa-solid fa-triangle-exclamation text-yellow-500 text-3xl mb-2"></i><br><b class="text-lg">구글 로그인 실패</b><br><span class="text-xs text-red-500">${errorMsg}</span></div><div class="mt-4 text-sm text-gray-600 bg-gray-50 p-3 rounded text-left leading-relaxed"><b>해결 방법:</b><br>${solution}</div>`);
            }
        };

        window.handleGuestLogin = async () => {
            if (!auth) return;
            try {
                // 미리보기 환경을 위한 토큰 로그인을 먼저 시도합니다. 실패 시 일반 익명 로그인 진행.
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                        return;
                    } catch (e) {
                        console.log("토큰 로그인 실패, 익명 로그인으로 전환합니다.");
                    }
                }
                await signInAnonymously(auth);
            } catch (error) {
                let errorMsg = error.message;
                let solution = "";
                if (error.code === 'auth/admin-restricted-operation' || error.code === 'auth/operation-not-allowed') {
                    errorMsg = "Firebase에서 '익명 로그인'이 비활성화되어 있습니다.";
                    solution = `<div class="mt-4 text-sm text-gray-600 bg-gray-50 p-3 rounded text-left leading-relaxed"><b>해결 방법:</b><br>Firebase 콘솔의 <b>Authentication > Sign-in method</b> 탭에서 <b>익명(Anonymous)</b> 제공업체를 추가하고 '사용 설정'해주세요.</div>`;
                }
                customAlert(`<div class="text-center"><i class="fa-solid fa-triangle-exclamation text-yellow-500 text-3xl mb-2"></i><br><b class="text-lg">게스트 로그인 실패</b><br><span class="text-xs text-red-500">${errorMsg}</span></div>${solution}`);
            }
        };

        window.handleLogout = async () => {
            if (!auth) return;
            customConfirm("로그아웃 하시겠습니까?", async () => {
                await signOut(auth);
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            });
        };

        // --- 계정 연동(데이터 보존) 제어 ---
        window.openLinkAccountModal = () => {
            document.getElementById('linkEmailInput').value = '';
            document.getElementById('linkPasswordInput').value = '';
            document.getElementById('linkAccountModal').classList.remove('hidden');
        };

        window.closeLinkAccountModal = () => {
            document.getElementById('linkAccountModal').classList.add('hidden');
        };

        window.handleEmailLink = async () => {
            if (!auth || !auth.currentUser) return;
            const email = document.getElementById('linkEmailInput').value;
            const password = document.getElementById('linkPasswordInput').value;
            if (!email || !password) return customAlert("이메일과 비밀번호를 모두 입력해주세요.");

            try {
                const credential = EmailAuthProvider.credential(email, password);
                const userCred = await linkWithCredential(auth.currentUser, credential);
                customAlert("계정이 성공적으로 연동되었습니다! 이제 데이터가 안전하게 보관됩니다.");
                window.closeLinkAccountModal();
                updateHeaderUI(userCred.user); // 헤더 UI 갱신
            } catch (error) {
                if (error.code === 'auth/email-already-in-use' || error.code === 'auth/credential-already-in-use') {
                    customAlert("이미 가입되어 있는 이메일입니다. 다른 이메일을 사용해주세요.");
                } else {
                    customAlert("계정 연동 실패: " + error.message);
                }
            }
        };

        window.handleGoogleLink = async () => {
            if (!auth || !auth.currentUser) return;
            const provider = new GoogleAuthProvider();
            try {
                const userCred = await linkWithPopup(auth.currentUser, provider);
                customAlert("구글 계정이 성공적으로 연동되었습니다! 이제 데이터가 안전하게 보관됩니다.");
                window.closeLinkAccountModal();
                updateHeaderUI(userCred.user); // 헤더 UI 갱신
            } catch (error) {
                let errorMsg = "계정 연동 처리에 실패했습니다. (" + error.code + ")";
                if (error.code === 'auth/credential-already-in-use') {
                    errorMsg = "이미 다른 계정에 연동된 구글 계정입니다.";
                } else if (error.code === 'auth/popup-closed-by-user') {
                    errorMsg = "로그인 팝업이 닫혔습니다.";
                }
                customAlert(`<b>구글 연동 실패</b><br><span class="text-xs text-red-500">${errorMsg}</span>`);
            }
        };

        // ------------------ 데이터베이스(Firestore) 및 UI 로직 ------------------
        function migrateDataFormat() {
            let isModified = false;
            categories.forEach(cat => {
                if (linkData[cat] && Array.isArray(linkData[cat])) {
                    if (linkData[cat].length === 0 || linkData[cat][0].url !== undefined) {
                        const oldLinks = linkData[cat].filter(item => item.url !== undefined);
                        linkData[cat] = [{
                            id: 'sub_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                            title: '기본 분류',
                            isOpen: true,
                            links: oldLinks
                        }];
                        isModified = true;
                    }
                } else if (!linkData[cat]) {
                    linkData[cat] = [{
                        id: 'sub_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                        title: '기본 분류',
                        isOpen: true,
                        links: []
                    }];
                    isModified = true;
                }
            });
            if (isModified && currentUser) saveData();
        }

        function loadDataFromFirestore() {
            if (!currentUser || !db) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'memoData', 'main');

            unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    categories = data.categories || ['업무', '학습', '개인', '도구', '기타'];
                    linkData = data.linkData || {};

                    if (!categories.includes(activeTab)) activeTab = categories[0] || '';
                } else {
                    categories = ['업무', '학습', '개인', '도구', '기타'];
                    activeTab = categories[0];
                    linkData = {};
                    categories.forEach(cat => { linkData[cat] = []; });
                }

                migrateDataFormat();

                if (!document.body.classList.contains('is-dragging')) {
                    if (isFirstLoad) {
                        initApp();
                        isFirstLoad = false;
                    } else {
                        renderTabs();
                        renderSubCategorySelect();
                        renderLinks();
                    }
                }
            }, (error) => {
                console.error("Firestore read error:", error);
            });
        }

        async function saveData() {
            if (!currentUser || !db) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'memoData', 'main');
            try { await setDoc(docRef, { categories: categories, linkData: linkData }); }
            catch (error) { customAlert("클라우드 저장에 실패했습니다."); }
        }

        function initApp() {
            renderTabs();
            renderSubCategorySelect();
            renderLinks();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = '';

            categories.forEach(category => {
                const isActive = category === activeTab;
                const tabButton = document.createElement('div');
                tabButton.className = `group flex items-center px-5 py-3 font-medium text-sm transition-colors duration-200 cursor-pointer ${isActive ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50 border-b-2 border-transparent'
                    }`;
                tabButton.onclick = () => switchTab(category);

                const span = document.createElement('span');
                span.textContent = category;
                tabButton.appendChild(span);

                if (isActive) {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'ml-2 text-gray-400 hover:text-blue-600 focus:outline-none';
                    editBtn.innerHTML = '<i class="fa-solid fa-pen-to-square text-xs"></i>';
                    editBtn.onclick = (e) => { e.stopPropagation(); window.editMainCategory(category); };
                    tabButton.appendChild(editBtn);

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'ml-1 text-gray-400 hover:text-red-500 focus:outline-none';
                    deleteBtn.innerHTML = '<i class="fa-solid fa-trash-can text-xs"></i>';
                    deleteBtn.onclick = (e) => { e.stopPropagation(); window.deleteMainCategory(category); };
                    tabButton.appendChild(deleteBtn);
                }
                tabsContainer.appendChild(tabButton);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'flex items-center px-4 py-3 font-medium text-sm text-gray-400 hover:text-blue-600 transition-colors duration-200 focus:outline-none border-b-2 border-transparent';
            addBtn.innerHTML = '<i class="fa-solid fa-plus mr-1"></i>추가';
            addBtn.onclick = window.addMainCategory;
            tabsContainer.appendChild(addBtn);
        }

        function switchTab(category) {
            activeTab = category;
            renderTabs();
            renderSubCategorySelect();
            renderLinks();
        }

        window.addMainCategory = () => {
            customPrompt("새 카테고리 이름을 입력하세요:", "", (newCat) => {
                if (newCat && newCat.trim() !== '') {
                    const trimmedName = newCat.trim();
                    if (categories.includes(trimmedName)) return customAlert("이미 존재하는 카테고리입니다.");
                    categories.push(trimmedName);
                    linkData[trimmedName] = [{ id: 'sub_' + Date.now().toString(36), title: '기본 분류', isOpen: true, links: [] }];
                    saveData();
                    activeTab = trimmedName;
                    switchTab(trimmedName);
                }
            });
        };

        window.editMainCategory = (oldCat) => {
            customPrompt(`'${oldCat}' 카테고리의 새 이름을 입력하세요:`, oldCat, (newCat) => {
                if (newCat && newCat.trim() !== '' && newCat.trim() !== oldCat) {
                    const trimmedName = newCat.trim();
                    if (categories.includes(trimmedName)) return customAlert("이미 존재하는 카테고리입니다.");
                    const index = categories.indexOf(oldCat);
                    categories[index] = trimmedName;
                    linkData[trimmedName] = linkData[oldCat];
                    delete linkData[oldCat];
                    saveData();
                    if (activeTab === oldCat) activeTab = trimmedName;
                    switchTab(activeTab);
                }
            });
        };

        window.deleteMainCategory = (catName) => {
            if (categories.length <= 1) return customAlert("최소 1개의 카테고리는 유지해야 합니다.");
            customConfirm(`'${catName}' 카테고리를 삭제하시겠습니까?<br><span class="text-xs text-red-500 font-normal mt-1 block">(포함된 모든 데이터가 삭제됩니다)</span>`, () => {
                categories = categories.filter(c => c !== catName);
                delete linkData[catName];
                saveData();
                if (activeTab === catName) activeTab = categories[0];
                switchTab(activeTab);
            });
        };

        function renderSubCategorySelect() {
            const select = document.getElementById('subCategorySelect');
            select.innerHTML = '';
            const currentSubs = linkData[activeTab] || [];

            if (currentSubs.length === 0) {
                const opt = document.createElement('option');
                opt.value = "";
                opt.textContent = "소분류를 추가해주세요";
                opt.disabled = true;
                opt.selected = true;
                select.appendChild(opt);
                return;
            }
            currentSubs.forEach((sub, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = sub.title;
                select.appendChild(opt);
            });
        }

        window.addSubcategory = () => {
            customPrompt("새로운 소분류 이름을 입력하세요:", "", (newName) => {
                if (newName && newName.trim() !== '') {
                    if (!linkData[activeTab]) linkData[activeTab] = [];
                    linkData[activeTab].push({ id: 'sub_' + Date.now(), title: newName.trim(), isOpen: true, links: [] });
                    saveData();
                    renderSubCategorySelect();
                    renderLinks();
                }
            });
        };

        window.editSubcategory = (subIndex, oldName) => {
            customPrompt(`'${oldName}' 소분류의 새 이름을 입력하세요:`, oldName, (newName) => {
                if (newName && newName.trim() !== '' && newName.trim() !== oldName) {
                    linkData[activeTab][subIndex].title = newName.trim();
                    saveData();
                    renderSubCategorySelect();
                    renderLinks();
                }
            });
        };

        window.deleteSubcategory = (subIndex, name) => {
            customConfirm(`'${name}' 소분류를 삭제하시겠습니까?<br><span class="text-xs text-red-500 font-normal mt-1 block">(포함된 링크도 모두 삭제됩니다)</span>`, () => {
                linkData[activeTab].splice(subIndex, 1);
                if (linkData[activeTab].length === 0) {
                    linkData[activeTab].push({ id: 'sub_' + Date.now().toString(36), title: '기본 분류', isOpen: true, links: [] });
                }
                saveData();
                renderSubCategorySelect();
                renderLinks();
            });
        };

        window.toggleSubcategory = (subIndex) => {
            const sub = linkData[activeTab][subIndex];
            sub.isOpen = !sub.isOpen;
            saveData();
            renderLinks();
        };

        function renderLinks() {
            const linksContainer = document.getElementById('linksContainer');
            const emptyState = document.getElementById('emptyState');

            linksContainer.innerHTML = '';
            const currentSubs = linkData[activeTab] || [];

            if (currentSubs.length === 0) {
                linksContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            } else {
                linksContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            currentSubs.forEach((subCat, subIndex) => {
                const subWrapper = document.createElement('div');
                subWrapper.className = 'bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden';

                const header = document.createElement('div');
                header.className = `subcat-header flex justify-between items-center bg-gray-50 hover:bg-gray-100 px-4 py-3 cursor-pointer select-none transition-colors border-b ${subCat.isOpen ? 'border-gray-200' : 'border-transparent'}`;
                if (!subCat.isOpen) header.classList.add('is-closed');

                header.innerHTML = `
                    <div class="flex items-center flex-1" onclick="window.toggleSubcategory(${subIndex})">
                        <i class="fa-solid fa-chevron-down text-gray-400 mr-3 text-sm"></i>
                        <h3 class="font-bold text-gray-700">${subCat.title} <span class="text-xs text-gray-400 ml-1 font-normal">(${subCat.links.length})</span></h3>
                    </div>
                    <div class="flex gap-2">
                        <button class="text-gray-400 hover:text-blue-500 p-1" onclick="window.editSubcategory(${subIndex}, '${subCat.title}')" title="수정"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="text-gray-400 hover:text-red-500 p-1" onclick="window.deleteSubcategory(${subIndex}, '${subCat.title}')" title="삭제"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;

                header.dataset.subIndex = subIndex;
                header.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
                header.addEventListener('dragenter', function (e) { this.classList.add('bg-blue-100'); });
                header.addEventListener('dragleave', function (e) { this.classList.remove('bg-blue-100'); });
                header.addEventListener('drop', function (e) {
                    e.preventDefault();
                    this.classList.remove('bg-blue-100');
                    if (draggedItem !== null) {
                        const targetSubIndex = parseInt(this.dataset.subIndex);
                        const { subIndex: fromSub, linkIndex: fromLink } = draggedItem;
                        if (fromSub !== targetSubIndex) {
                            const draggedData = linkData[activeTab][fromSub].links.splice(fromLink, 1)[0];
                            linkData[activeTab][targetSubIndex].links.push(draggedData);
                            saveData();
                            renderLinks();
                        }
                    }
                });

                const gridContainer = document.createElement('div');
                gridContainer.className = `grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 p-4 transition-all duration-300 ${subCat.isOpen ? 'block' : 'hidden'}`;

                gridContainer.dataset.subIndex = subIndex;
                gridContainer.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
                gridContainer.addEventListener('dragenter', function (e) { this.classList.add('bg-blue-50/50'); });
                gridContainer.addEventListener('dragleave', function (e) { this.classList.remove('bg-blue-50/50'); });
                gridContainer.addEventListener('drop', function (e) {
                    e.preventDefault();
                    this.classList.remove('bg-blue-50/50');
                    if (e.target === this && draggedItem !== null) {
                        const targetSubIndex = parseInt(this.dataset.subIndex);
                        const { subIndex: fromSub, linkIndex: fromLink } = draggedItem;
                        const draggedData = linkData[activeTab][fromSub].links.splice(fromLink, 1)[0];
                        linkData[activeTab][targetSubIndex].links.push(draggedData);
                        saveData();
                        renderLinks();
                    }
                });

                if (subCat.links.length === 0) {
                    const emptyNote = document.createElement('div');
                    emptyNote.className = "col-span-full text-center text-sm text-gray-400 py-2 italic pointer-events-none";
                    emptyNote.textContent = "저장된 링크가 없습니다. 링크를 추가하거나 이곳으로 드래그하세요.";
                    gridContainer.appendChild(emptyNote);
                }

                subCat.links.forEach((item, linkIndex) => {
                    const linkCard = document.createElement('div');
                    linkCard.className = 'link-card group flex flex-col gap-1.5 cursor-move h-full transition-all duration-200';
                    linkCard.draggable = true;
                    linkCard.dataset.subIndex = subIndex;
                    linkCard.dataset.linkIndex = linkIndex;

                    linkCard.addEventListener('dragstart', function (e) {
                        draggedItem = { subIndex: subIndex, linkIndex: linkIndex };
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', '');
                        document.body.classList.add('is-dragging');
                        setTimeout(() => this.classList.add('opacity-40'), 0);
                    });

                    linkCard.addEventListener('dragend', function (e) {
                        document.body.classList.remove('is-dragging');
                        this.classList.remove('opacity-40');
                        document.querySelectorAll('.link-card').forEach(card => card.classList.remove('ring-2', 'ring-blue-500', 'rounded-xl', 'scale-105'));
                        draggedItem = null;
                    });

                    linkCard.addEventListener('dragover', function (e) {
                        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
                    });

                    linkCard.addEventListener('dragenter', function (e) {
                        e.preventDefault();
                        if (draggedItem !== null && (draggedItem.subIndex !== subIndex || draggedItem.linkIndex !== linkIndex)) {
                            this.classList.add('ring-2', 'ring-blue-500', 'rounded-xl', 'scale-105');
                        }
                    });

                    linkCard.addEventListener('dragleave', function (e) {
                        this.classList.remove('ring-2', 'ring-blue-500', 'rounded-xl', 'scale-105');
                    });

                    linkCard.addEventListener('drop', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        this.classList.remove('ring-2', 'ring-blue-500', 'rounded-xl', 'scale-105');

                        if (draggedItem !== null) {
                            const targetSubIndex = parseInt(this.dataset.subIndex);
                            const targetLinkIndex = parseInt(this.dataset.linkIndex);
                            const { subIndex: fromSub, linkIndex: fromLink } = draggedItem;

                            if (!(fromSub === targetSubIndex && fromLink === targetLinkIndex)) {
                                const draggedData = linkData[activeTab][fromSub].links.splice(fromLink, 1)[0];
                                linkData[activeTab][targetSubIndex].links.splice(targetLinkIndex, 0, draggedData);
                                saveData();
                                renderLinks();
                            }
                        }
                    });

                    const btnBox = document.createElement('div');
                    btnBox.className = 'relative bg-white border border-gray-200 group-hover:border-blue-300 rounded-lg shadow-sm group-hover:shadow-md transition-all duration-200 overflow-hidden flex items-stretch min-h-[3.5rem] w-full';

                    const anchor = document.createElement('a');
                    anchor.href = item.url;
                    anchor.target = "_blank";
                    anchor.draggable = false;
                    anchor.className = 'flex-1 flex items-center justify-center p-2 text-gray-700 hover:text-blue-600 hover:bg-blue-50/50 transition-colors w-full overflow-hidden cursor-pointer';
                    anchor.innerHTML = `<span class="font-medium truncate w-full text-center leading-tight">${item.text}</span>`;

                    const actionBtns = document.createElement('div');
                    actionBtns.className = 'opacity-0 group-hover:opacity-100 absolute right-2 top-1/2 transform -translate-y-1/2 flex gap-1 transition-opacity duration-200';

                    const editTextBtn = document.createElement('button');
                    editTextBtn.className = 'w-7 h-7 rounded-full bg-gray-100 text-gray-500 hover:bg-blue-500 hover:text-white flex items-center justify-center transition-colors shadow-sm';
                    editTextBtn.innerHTML = '<i class="fa-solid fa-pen text-sm"></i>';
                    editTextBtn.title = "텍스트 수정";
                    editTextBtn.onclick = (e) => {
                        e.preventDefault();
                        window.editLinkText(subIndex, linkIndex);
                    };

                    const editBtn = document.createElement('button');
                    editBtn.className = 'w-7 h-7 rounded-full bg-gray-100 text-gray-500 hover:bg-blue-500 hover:text-white flex items-center justify-center transition-colors shadow-sm';
                    editBtn.innerHTML = '<i class="fa-regular fa-comment-dots text-sm"></i>';
                    editBtn.title = "코멘트 추가/수정";
                    editBtn.onclick = (e) => {
                        e.preventDefault();
                        window.editLinkComment(subIndex, linkIndex);
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'w-7 h-7 rounded-full bg-red-100 text-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors shadow-sm';
                    deleteBtn.innerHTML = '<i class="fa-solid fa-xmark text-sm"></i>';
                    deleteBtn.title = "삭제";
                    deleteBtn.onclick = (e) => {
                        e.preventDefault();
                        window.deleteLink(subIndex, linkIndex);
                    };

                    actionBtns.appendChild(editTextBtn);
                    actionBtns.appendChild(editBtn);
                    actionBtns.appendChild(deleteBtn);

                    btnBox.appendChild(anchor);
                    btnBox.appendChild(actionBtns);
                    linkCard.appendChild(btnBox);

                    if (item.comment) {
                        const commentDiv = document.createElement('div');
                        commentDiv.className = 'text-xs text-gray-500 px-1.5 pb-1 break-words text-center leading-snug w-full';
                        commentDiv.textContent = item.comment;
                        // [버그 수정] 생성된 코멘트 엘리먼트를 실제 linkCard 부모 엘리먼트에 장착합니다.
                        linkCard.appendChild(commentDiv);
                    }

                    gridContainer.appendChild(linkCard);
                });

                subWrapper.appendChild(header);
                subWrapper.appendChild(gridContainer);
                linksContainer.appendChild(subWrapper);
            });
        }

        window.handleKeyPress = function (event) {
            if (event.key === 'Enter') {
                window.saveLink();
            }
        };

        window.saveLink = function () {
            const selectTarget = document.getElementById('subCategorySelect');
            const textInput = document.getElementById('linkText');
            const urlInput = document.getElementById('linkUrl');
            const commentInput = document.getElementById('linkComment');

            const subIndex = selectTarget.value;
            const text = textInput.value.trim();
            let url = urlInput.value.trim();
            const comment = commentInput.value.trim();

            if (subIndex === "") return customAlert("저장할 소분류를 먼저 추가해주세요.");
            if (!text) return customAlert("버튼에 표시될 텍스트를 입력해주세요.");
            if (!url) return customAlert("연결할 링크 주소(URL)를 입력해주세요.");

            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;

            linkData[activeTab][subIndex].links.push({ text: text, url: url, comment: comment });

            saveData();
            renderLinks();
            textInput.value = '';
            urlInput.value = '';
            commentInput.value = '';
            textInput.focus();
        };

        window.deleteLink = function (subIndex, linkIndex) {
            customConfirm("이 링크를 삭제하시겠습니까?", () => {
                linkData[activeTab][subIndex].links.splice(linkIndex, 1);
                saveData();
                renderLinks();
            });
        };

        window.editLinkText = function (subIndex, linkIndex) {
            const link = linkData[activeTab][subIndex].links[linkIndex];
            const currentText = link.text || '';

            customPrompt(`버튼 텍스트를 수정하세요:`, currentText, (newText) => {
                if (newText !== null) {
                    if (newText.trim() === '') {
                        customAlert("버튼 텍스트는 비워둘 수 없습니다.");
                    } else {
                        link.text = newText.trim();
                        saveData();
                        renderLinks();
                    }
                }
            });
        };

        window.editLinkComment = function (subIndex, linkIndex) {
            const link = linkData[activeTab][subIndex].links[linkIndex];
            const currentComment = link.comment || '';

            customPrompt(`'${link.text}'의 코멘트를 입력하세요:`, currentComment, (newComment) => {
                if (newComment !== null) {
                    link.comment = newComment.trim();
                    saveData();
                    renderLinks();
                }
            });
        };
    </script>
</body>

</html>
