<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리별 링크 메모장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon-96x96.png" type="img/favicon-96x96.png">
    <link rel="stylesheet" href="./index.css">
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <!-- 로그인 화면 -->
    <div id="loginScreen" class="hidden fixed inset-0 bg-gray-100 z-40 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl p-8 w-full max-w-md border border-gray-200">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-800"><i class="fa-solid fa-bookmark text-blue-500 mr-2"></i>링크 메모장</h2>
                <p class="text-gray-500 mt-2">나만의 카테고리별 링크를 저장하세요</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="example@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" onkeypress="if(event.key==='Enter') window.handleEmailLogin()">
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="window.handleEmailLogin()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">로그인</button>
                    <button onclick="window.handleEmailRegister()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg transition-colors border border-gray-300">회원가입</button>
                </div>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">또는</span></div>
                </div>

                <button onclick="window.handleGoogleLogin()" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-2 px-4 rounded-lg border border-gray-300 shadow-sm flex items-center justify-center gap-2 transition-colors mb-2">
                    <i class="fa-brands fa-google text-red-500"></i> Google로 로그인
                </button>

                <button onclick="window.handleGuestLogin()" class="w-full text-center text-sm text-gray-500 hover:text-gray-800 underline transition-colors pt-2">
                    게스트로 시작하기
                </button>
            </div>
        </div>
    </div>

    <!-- 홈 랜딩 화면 -->
    <div id="homeLanding" class="hidden max-w-5xl mx-auto mt-10 bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight"><i class="fa-solid fa-bookmark text-blue-500 mr-2"></i>링크 메모장</h1>
                <p class="text-gray-500 mt-2">폴더를 선택해 저장한 링크 공간으로 이동하세요.</p>
            </div>
            <div id="homeUserInfoDisplay" class="text-sm font-medium flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-200 shadow-sm"></div>
        </div>

        <section class="mb-8">
            <h2 class="text-sm font-bold text-gray-500 mb-3 px-1">빠른 메뉴</h2>
            <div id="fixedFolderGrid" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
        </section>

        <section>
            <h2 class="text-sm font-bold text-gray-500 mb-3 px-1">메인 탭 폴더</h2>
            <div id="categoryFolderGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </div>

    <!-- 메인 앱 -->
    <div id="mainApp" class="hidden max-w-5xl mx-auto mt-10 bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-3">
                <button onclick="window.showHome()" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-600 hover:text-blue-600 flex items-center justify-center transition-colors" title="홈으로">
                    <i class="fa-solid fa-house"></i>
                </button>
                <h1 class="text-3xl font-extrabold text-center text-gray-800 tracking-tight"><i class="fa-solid fa-bookmark text-blue-500 mr-2"></i>카테고리별 링크 메모장</h1>
            </div>
            <div id="userInfoDisplay" class="text-sm font-medium flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-200 shadow-sm"></div>
        </div>

        <div id="tabsContainer" class="flex border-b border-gray-300 mb-6 overflow-x-auto whitespace-nowrap scrollbar-hide"></div>

        <div class="bg-blue-50 p-5 rounded-lg mb-4 border border-blue-100 shadow-sm flex flex-col gap-3">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-[0.8] flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-solid fa-folder-tree text-gray-400 mr-2"></i>
                    <select id="subCategorySelect" class="w-full py-2 outline-none bg-transparent cursor-pointer text-gray-700"></select>
                </div>

                <div class="flex-1 flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-solid fa-font text-gray-400 mr-2"></i>
                    <input type="text" id="linkText" placeholder="버튼 텍스트 (예: 네이버)" class="w-full py-2 outline-none bg-transparent" autocomplete="off">
                </div>

                <div class="flex-[2] flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-solid fa-link text-gray-400 mr-2"></i>
                    <input type="text" id="linkUrl" placeholder="링크 (예: https://naver.com)" class="w-full py-2 outline-none bg-transparent" autocomplete="off">
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-1 flex items-center bg-white rounded border border-gray-300 px-3 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent">
                    <i class="fa-regular fa-comment text-gray-400 mr-2"></i>
                    <input type="text" id="linkComment" placeholder="코멘트 (선택사항, 예: 디자인 레퍼런스용)" class="w-full py-2 outline-none bg-transparent" autocomplete="off" onkeypress="window.handleKeyPress(event)">
                </div>

                <label class="image-action-button bg-white hover:bg-gray-50 border border-gray-300 text-gray-700 font-semibold px-4 py-2 rounded shadow-sm transition-colors duration-200 flex items-center justify-center whitespace-nowrap cursor-pointer">
                    <i class="fa-regular fa-image mr-2 text-blue-500"></i>이미지 첨부
                    <input type="file" id="linkImage" accept="image/*" class="hidden">
                </label>

                <button onclick="window.saveLink()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-2 rounded shadow transition-colors duration-200 flex items-center justify-center whitespace-nowrap">
                    <i class="fa-solid fa-plus mr-2"></i>저장
                </button>
            </div>

            <div id="imagePreview" class="image-preview-chip hidden bg-white border border-blue-100 rounded px-3 py-2 text-sm text-gray-600 items-center justify-between gap-3">
                <span class="flex items-center min-w-0"><i class="fa-regular fa-image text-blue-500 mr-2"></i><span id="imagePreviewName" class="truncate"></span></span>
                <button type="button" onclick="window.clearSelectedImage()" class="text-xs text-red-500 hover:text-red-700 font-semibold">제거</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-2 px-2">
            <span class="text-sm font-medium text-gray-500" id="currentTabLabel">현재 카테고리 내역</span>
            <button onclick="window.addSubcategory()" class="text-sm bg-white border border-gray-300 hover:border-blue-500 hover:text-blue-600 text-gray-600 px-3 py-1.5 rounded transition-colors shadow-sm flex items-center">
                <i class="fa-solid fa-folder-plus mr-1.5"></i>소분류 추가
            </button>
        </div>

        <div id="linksContainer" class="space-y-4"></div>

        <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-gray-400">
            <i class="fa-regular fa-folder-open text-4xl mb-3"></i>
            <p>이 카테고리에 생성된 소분류 및 링크가 없습니다.</p>
        </div>
    </div>

    <!-- 커스텀 모달 UI -->
    <div id="customModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-xl p-6 w-[90%] max-w-sm">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-2">알림</h3>
            <p id="modalMessage" class="text-gray-600 text-sm mb-4 break-keep">메시지 내용</p>
            <textarea id="modalInput" rows="1" class="hidden w-full border border-gray-300 rounded p-2 mb-4 focus:ring-2 focus:ring-blue-400 outline-none resize-none overflow-hidden leading-snug" autocomplete="off" style="min-height: 42px; max-height: 200px; overflow-y: auto;"></textarea>
            <div class="flex justify-end gap-2 mt-2">
                <button id="modalCancelBtn" class="hidden px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded transition-colors">취소</button>
                <button id="modalConfirmBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded transition-colors">확인</button>
            </div>
        </div>
    </div>

    <!-- 이미지 미리보기 모달 -->
    <div id="imagePreviewModal" class="image-preview-backdrop hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="image-preview-dialog bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
                <h3 id="imagePreviewModalTitle" class="font-bold text-gray-800 truncate">첨부 이미지</h3>
                <button onclick="window.hideImagePreview()" class="w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center" title="닫기"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bg-gray-50 p-4 flex items-center justify-center">
                <img id="imagePreviewModalImg" alt="첨부 이미지 미리보기" class="max-w-full object-contain rounded-lg shadow-sm">
            </div>
        </div>
    </div>

    <!-- 계정 연동(데이터 보존) 모달 UI -->
    <div id="linkAccountModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-xl p-6 w-[90%] max-w-md">
            <h3 class="text-lg font-bold text-gray-800 mb-2"><i class="fa-solid fa-link text-blue-500 mr-2"></i>계정 연동</h3>
            <p class="text-gray-600 text-sm mb-5 break-keep">게스트로 작성하신 데이터가 사라지지 않도록 계정을 연동해 안전하게 영구 보관하세요.</p>

            <div class="space-y-3 mb-4">
                <input type="email" id="linkEmailInput" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="연동할 이메일 주소" autocomplete="off">
                <input type="password" id="linkPasswordInput" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="비밀번호 (6자리 이상)" autocomplete="off">
                <button onclick="window.handleEmailLink()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">이메일 계정으로 연동</button>
            </div>

            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">또는</span></div>
            </div>

            <button onclick="window.handleGoogleLink()" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-2 rounded-lg border border-gray-300 shadow-sm flex items-center justify-center gap-2 transition-colors mb-5">
                <i class="fa-brands fa-google text-red-500"></i> Google 계정으로 연동
            </button>

            <div class="flex justify-end border-t border-gray-200 pt-3">
                <button onclick="window.closeLinkAccountModal()" class="px-5 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded transition-colors">닫기</button>
            </div>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
