name: Deploy Drive Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/drive-api/**"
      - ".github/workflows/deploy-drive-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
    steps:
      - name: Check deployment configuration
        id: configuration
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Worker deployment is waiting for its Cloudflare GitHub Actions secrets."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.configuration.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.configuration.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Worker dependencies
        if: steps.configuration.outputs.ready == 'true'
        working-directory: workers/drive-api
        run: npm install

      - name: Inject D1 binding identifier
        if: steps.configuration.outputs.ready == 'true'
        working-directory: workers/drive-api
        run: |
          [[ "$CLOUDFLARE_D1_DATABASE_ID" =~ ^[0-9a-fA-F-]{36}$ ]]
          sed -i "s|__D1_DATABASE_ID__|$CLOUDFLARE_D1_DATABASE_ID|g" wrangler.jsonc

      - name: Apply idempotent D1 schema
        if: steps.configuration.outputs.ready == 'true'
        working-directory: workers/drive-api
        run: npx wrangler d1 execute link-memo-drive-credentials --remote --file=./schema.sql --yes

      - name: Deploy Worker
        if: steps.configuration.outputs.ready == 'true'
        working-directory: workers/drive-api
        run: npm run deploy
