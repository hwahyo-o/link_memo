name: Deploy Drive Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/drive-api/**"
      - ".github/workflows/deploy-drive-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configuration-needed:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain required GitHub secrets
        run: |
          echo "::notice::Worker deployment is waiting for CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID GitHub Actions secrets."
          echo "Add both repository secrets, then run this workflow manually."

  deploy:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: workers/drive-api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Worker dependencies
        run: npm install

      - name: Apply idempotent D1 schema
        run: npx wrangler d1 execute link-memo-drive-credentials --remote --file=./schema.sql --yes

      - name: Deploy Worker
        run: npm run deploy
